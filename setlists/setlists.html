<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta name="robots" content="noindex">

  <title>セトリ一覧</title>

  <!-- setlistsフォルダ内のCSSを読み込む -->
  <link rel="stylesheet" href="setlists/setlists.css">
</head>

<body>

  <header class="site-header">

    <h1>セトリ一覧</h1>

    <nav class="global-menu">
      <a href="../index.html">
        ホーム
      </a>

      <a href="../search/search.html">
        セトリ検索
      </a>

      <a
        href="setlists.html"
        class="active"
      >
        セトリ一覧
      </a>
    </nav>

  </header>

  <main class="setlist-main">

    <!-- アーティスト選択タブ -->
    <div class="live-artist-tabs">

      <button
        type="button"
        class="live-artist-tab active"
        data-artist="浦島坂田船"
      >
        浦島坂田船
      </button>

      <button
        type="button"
        class="live-artist-tab"
        data-artist="そまうさ"
      >
        そまうさ
      </button>

      <button
        type="button"
        class="live-artist-tab"
        data-artist="センラ"
      >
        センラ
      </button>

    </div>

    <!-- 選択したアーティストの年号タブが入る -->
    <div
      id="year-tabs"
      class="year-tabs"
    ></div>

    <!-- ライブタイトルや公演一覧が入る -->
    <div id="live-title-list"></div>

  </main>

  <!--
    最初に一覧表示用の処理を読み込む。
    この中でaddLiveTour関数を定義する。
  -->
  <script src="setlists/setlists.js"></script>

  <!--
    addLiveTour関数の定義後に、
    セトリ一覧用データを読み込む。
  -->
  <script src="setlists/data/live-usss.js"></script>
  <script src="setlists/data/live-senra.js"></script>

</body>

</html>
