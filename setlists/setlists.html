<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta name="robots" content="noindex">

  <title>セトリ一覧</title>

  <!--
    setlists.htmlと同じフォルダにある
    setlists.cssを読み込む
  -->
  <link rel="stylesheet" href="setlists.css">
</head>

<body>

  <header class="site-header">

    <h1>セトリ一覧</h1>

    <nav class="global-menu">

      <!-- 1つ上の階層にあるindex.htmlへ移動 -->
      <a href="../index.html">
        ホーム
      </a>

      <!--
        1つ上の階層へ戻り、
        searchフォルダ内のsearch.htmlへ移動
      -->
      <a href="../search/search.html">
        セトリ検索
      </a>

      <!-- 現在開いているセトリ一覧ページ -->
      <a
        href="setlists.html"
        class="active"
      >
        セトリ一覧
      </a>

    </nav>

  </header>


  <main class="setlist-main">

    <!-- アーティスト選択タブ -->
    <div class="live-artist-tabs">

      <button
        type="button"
        class="live-artist-tab active"
        data-artist="浦島坂田船"
      >
        浦島坂田船
      </button>

      <button
        type="button"
        class="live-artist-tab"
        data-artist="そまうさ"
      >
        そまうさ
      </button>

      <button
        type="button"
        class="live-artist-tab"
        data-artist="センラ"
      >
        センラ
      </button>

      <button
        type="button"
        class="live-artist-tab"
        data-artist="しまさか"
      >
        しまさか
      </button>

    </div>


    <!-- 選択したアーティストの年号タブが表示される場所 -->
    <div
      id="year-tabs"
      class="year-tabs"
    ></div>


    <!-- ライブタイトルとセットリストが表示される場所 -->
    <div id="live-title-list"></div>

  </main>


  <!--
    最初に一覧表示用の処理を読み込む。

    setlists.jsの中に、
    データ登録用のaddSetlist関数と
    一覧表示処理を記述しておく。
  -->
  <script src="setlists.js"></script>


  <!--
    setlists.jsを読み込んだ後に、
    dataフォルダ内のセットリストデータを読み込む
  -->
  <script src="data/live-usss.js"></script>
  <script src="data/live-senra.js"></script>

  <!--
    しまさかのデータファイルを
    live-shimasaka.jsという名前で保存した場合
  -->
  <script src="data/live-shimasaka.js"></script>

</body>

</html>
