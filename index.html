<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta name="robots" content="noindex">

  <title>セトリ検索サイト</title>

  <!-- index.htmlと同じ場所にあるhome.cssを読み込む -->
  <link rel="stylesheet" href="home.css?v=2">
</head>

<body>

  <header class="site-header">
    <h1>セトリ検索サイト</h1>
  </header>


  <p class="notice">
    ・本サイトは浦島坂田船に関する過去ライブセトリを個人で整理した非公式検索ページです。<br>
    ・公式サイトとは一切関係ありません。<br>
    ・データの友人間での共有は可能ですが、SNS等での拡散はご遠慮ください。<br>
    ・状況により、予告なく公開を停止する場合があります。
  </p>


  <main class="home-main">

    <section class="home-intro">

      <h2>このサイトについて</h2>

      <p>
        曲名からライブを検索したり、
        公演ごとのセットリストを確認したりできます。
      </p>

    </section>


    <section class="home-menu">

      <!-- 検索ページへ移動 -->
      <a
        href="search/search.html"
        class="home-menu-card"
      >
        <h2>セトリ検索</h2>

        <p>
          曲名を入力して、その曲が披露されたライブを検索します。
        </p>
      </a>


      <!-- セトリ一覧ページへ移動 -->
      <a
        href="setlists/setlists.html"
        class="home-menu-card"
      >
        <h2>セトリ一覧</h2>

        <p>
          年や公演名から、ライブごとのセットリストを確認します。
        </p>
      </a>

    </section>

  </main>

</body>

</html>
