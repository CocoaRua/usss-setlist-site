<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>浦島坂田船 セトリ検索</title>
<link rel="stylesheet" href="style.css">
</head>

<body>


<p class="notice">
・本サイトは浦島坂田船の過去ライブセトリを個人で整理した非公式検索ページです。<br>
・公式サイトとは一切関係ありません。<br>
・データの友人間での共有は可能ですが、SNS等での拡散はご遠慮ください。<br>
・状況により、予告なく公開を停止する場合があります。
</p>



<div id="loginBox">
  <h2>パスワードを入力してください</h2>
  <input type="password" id="passwordInput" placeholder="Password">
  <button onclick="checkPassword()">入室する</button>
  <p id="errorMsg"></p>
</div>









<div id="mainSite">
  <h1>浦島坂田船 セトリ検索</h1>

  <input id="searchBox" placeholder="曲名を入力">
  <ul id="suggest"></ul>

  <button id="searchBtn">検索</button>

  <ul id="result"></ul>
</div>






<script>
function checkPassword() {
  const pass = document.getElementById("passwordInput").value;

  if (pass === "USSS0907") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("mainSite").style.display = "block";
  } else {
    document.getElementById("errorMsg").textContent = "パスワードが違います";
  }
}
</script>










<script src="script.js"></script>

</body>
</html>
