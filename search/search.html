<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta name="robots" content="noindex">

  <title>セトリ検索サイト</title>

  <!-- searchフォルダ内のCSSを読み込む -->
  <link rel="stylesheet" href="search.css">
</head>

<body>

  <header class="site-header">

    <h1>セトリ検索サイト</h1>

    <nav class="global-menu">
      <a href="index.html">
        ホーム
      </a>

      <a
        href="search.html"
        class="active"
      >
        セトリ検索
      </a>

      <a href="../setlists/setlists.html">
        セトリ一覧
      </a>
    </nav>

  </header>

  <main id="mainSite">



    <!-- アーティスト選択タブ -->
    <div class="tabs">

      <button
        type="button"
        class="artist-tab active"
        data-artist="総合"
      >
        総合
      </button>

      <button
        type="button"
        class="artist-tab"
        data-artist="浦島坂田船"
      >
        浦島坂田船
      </button>

      <button
        type="button"
        class="artist-tab"
        data-artist="うらたぬき"
      >
        うらたぬき
      </button>

      <button
        type="button"
        class="artist-tab"
        data-artist="志麻"
      >
        志麻
      </button>

      <button
        type="button"
        class="artist-tab"
        data-artist="あほの坂田。/となりの坂田。"
      >
        あほの坂田。/となりの坂田。
      </button>

      <button
        type="button"
        class="artist-tab"
        data-artist="センラ"
      >
        センラ
      </button>

      <button
        type="button"
        class="artist-tab"
        data-artist="しまさか"
      >
        しまさか
      </button>

      <button
        type="button"
        class="artist-tab"
        data-artist="そまうさ"
      >
        そまうさ
      </button>

    </div>

    <!-- 曲名入力欄 -->
    <div class="search-area">

      <input
        id="searchBox"
        type="text"
        placeholder="曲名を入力"
        autocomplete="off"
      >

      <button
        id="searchBtn"
        type="button"
      >
        検索
      </button>

    </div>

    <!-- 入力候補 -->
    <ul id="suggest"></ul>

    <!-- 検索結果 -->
    <ul id="result"></ul>

  </main>

  <!--
    最初に検索処理を読み込む。
    この中でaddSetlist関数を定義する。
  -->
  <script src="search.js"></script>

  <!--
    addSetlist関数の定義後に、
    各アーティストのデータを読み込む。
  -->
 
<script src="data/urashimasakatasen.js"></script>
<script src="data/uratanuki.js"></script>
<script src="data/shima.js"></script>
<script src="data/sakata.js"></script>
<script src="data/senra.js"></script>
<script src="data/shimasaka.js"></script>
<script src="data/soramafuurasaka.js"></script>

</body>

</html>
